<nav 
  style="display: flex; align-items: center; gap: 15px; padding: 10px; background: #eee;">

  <p style="margin: 0;">{{ name }}</p>
  <p style="margin: 0;">{{ address }}</p>

  <a routerLink="summary">Home</a>
  <a routerLink="balance">Balance</a>
  <a routerLink="chatbot">Chatbot</a>

  <a *ngIf="user?.rol === 'admin'" routerLink="manage-users">
    Gestionar usuarios
  </a>

  <a 
    *ngIf="user?.rol === 'propietario' && user?.puerta_usuario"
    routerLink="contabilidad">
    Contabilidad
  </a>

  <button 
    (click)="logout()" 
    style="margin-left: auto; padding: 5px 10px; background: #ccc; border: none; border-radius: 5px; cursor: pointer;">
    Cerrar sesión
  </button>

</nav>
