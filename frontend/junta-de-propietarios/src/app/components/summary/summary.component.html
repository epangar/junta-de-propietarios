<h2>Resumen</h2>

<!-- SELECTOR DE AÑO -->
<div style="margin-bottom: 15px;">
  <label for="year">Año:</label>
  <input
    type="number"
    id="year"
    [(ngModel)]="year"
    style="margin-left: 10px; width: 100px;"
  />
  <button (click)="loadSummary()" style="margin-left: 10px;">
    Cargar por año
  </button>

  <!-- <label for="category">Categoría:</label>
  <input
    type="string"
    id="category"
    [(ngModel)]="category"
    style="margin-left: 10px; width: 100px;"
  /> -->

  <!-- <button (click)="loadSummary()" style="margin-left: 10px;">
    Cargar por categoría
  </button> -->
  
</div>

<!-- LOADING -->
<div *ngIf="loading">
  Cargando...
</div>

<!-- ERROR -->
<div *ngIf="error">
  {{ error }}
</div>

<!-- RESUMEN -->
<div *ngIf="summary && !loading"
     style="display: flex; gap: 20px; margin-top: 20px;">

  <!-- INGRESOS -->
  <div style="border: 1px solid #ccc; padding: 15px; border-radius: 8px; width: 200px;">
    <h3>Ingresos</h3>
    <p style="font-size: 20px; font-weight: bold; color: green;">
      {{ summary.total_ingresos | number:'1.0-2' }} €
    </p>
  </div>

  <!-- GASTOS -->
  <div style="border: 1px solid #ccc; padding: 15px; border-radius: 8px; width: 200px;">
    <h3>Gastos</h3>
    <p style="font-size: 20px; font-weight: bold; color: red;">
      {{ summary.total_gastos | number:'1.0-2' }} €
    </p>
  </div>

  <!-- CATEGORÍA -->
  <div *ngIf="summary.categoria" style="border: 1px solid #ccc; padding: 15px; border-radius: 8px; width: 200px;">
    <h3>Categoría</h3>
    <p style="font-size: 20px; font-weight: bold;">
      {{ summary.categoria }}
    </p>
  </div>



  <!-- SALDO -->
  <div style="border: 1px solid #ccc; padding: 15px; border-radius: 8px; width: 200px;">
    <h3>Saldo</h3>
    <p style="font-size: 20px; font-weight: bold;"
       [style.color]="summary.saldo_cierre >= 0 ? 'green' : 'red'">
      {{ summary.saldo_cierre | number:'1.0-2' }} €
    </p>
  </div>

</div>
