<section *ngIf="user.rol === 'admin'">

  <h2>Gestión de usuarios</h2>

  <!-- FORMULARIO -->
  <form (ngSubmit)="save()" #userForm="ngForm"
        style="border: 1px solid #ccc; padding: 12px; margin-bottom: 20px;">

    <h3>
      {{ selectedUser ? 'Editar usuario' : 'Crear usuario' }}
    </h3>

    <!-- EMAIL -->
    <label>Email</label><br>
    <input type="email"
           [(ngModel)]="formUser.email"
           name="email"
           placeholder="Email"
           required />

    <br><br>

    <!-- PASSWORD -->
    <label>Password</label><br>
    <input type="password"
           [(ngModel)]="formUser.password"
           name="password"
           placeholder="Password" />

    <br><br>

    <!-- ROL -->
    <label>Rol</label><br>
    <select [(ngModel)]="formUser.rol" name="rol">
      <option value="user">User</option>
      <option value="admin">Admin</option>
      <option value="propietario">Propietario</option>
      <option value="junta">Junta</option>
    </select>

    <br><br>

    <!-- PUERTA -->
    <label>Puerta</label><br>
    <input type="text"
           [(ngModel)]="formUser.puerta_usuario"
           name="puerta_usuario"
           placeholder="Ej: 1A, 2B..." />

    <br><br>

    <!-- BOTONES -->
    <button type="submit" [disabled]="userForm.invalid">
      {{ selectedUser ? 'Actualizar' : 'Crear' }}
    </button>

    <button type="button"
            *ngIf="selectedUser"
            (click)="resetForm()">
      Cancelar
    </button>

  </form>

  <!-- TABLA -->
  <h3>Usuarios</h3>

  <table border="1" width="100%" cellpadding="8">

    <thead>
      <tr>
        <th>Email</th>
        <th>Rol</th>
        <th>Puerta</th>
        <th>Activo</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let user of users">

        <!-- EMAIL -->
        <td>{{ user.email }}</td>

        <!-- ROL -->
        <td>{{ user.rol }}</td>

        <!-- PUERTA -->
        <td>{{ user.puerta_usuario || 'N/A' }}</td>

        <!-- ACTIVO -->
        <td>{{ user.activo ? 'Sí' : 'No' }}</td>

        <!-- ACCIONES -->
        <td>

          <button type="button" (click)="selectUser(user)">
            Editar
          </button>

          <button type="button" (click)="toggleActive(user)">
            {{ user.activo ? 'Desactivar' : 'Activar' }}
          </button>

        </td>

      </tr>
    </tbody>

  </table>

</section>
