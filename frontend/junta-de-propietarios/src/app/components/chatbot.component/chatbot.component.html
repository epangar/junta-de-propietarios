<div class="chat-container">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h3>📄 Documento</h3>

    <label class="upload">
      {{ nombreArchivo || 'Subir archivo .txt,.pdf,.xlsx o .xls' }}
      <input type="file" (change)="cargarArchivo($event)" accept=".txt,.pdf,.xlsx,.xls">
    </label>

    <p class="status" [class.ok]="textoDelActa">
      {{ textoDelActa ? 'Archivo cargado' : 'Sin archivo' }}
    </p>

    <div *ngIf="textoDelActa" class="info">
      <p>Caracteres: {{ textoDelActa.length }}</p>
      <p>Líneas: {{ textoDelActa.split('\n').length }}</p>
    </div>

  </aside>

  <!-- CHAT -->
  <main class="chat">

    <div class="messages">

      <div class="msg ia">
        Hola 👋 sube un documento y pregúntame lo que quieras
      </div>

      <div *ngFor="let m of mensajes" class="msg" [class.user]="m.rol === 'user'" [class.ia]="m.rol === 'ia'">
        {{ m.texto }}
      </div>

      <div *ngIf="cargando" class="msg ia typing">
        Pensando...
      </div>

    </div>

    <div class="input-bar">
      <input
        [(ngModel)]="miPregunta"
        (keyup.enter)="preguntar()"
        placeholder="Escribe tu pregunta..."
        >

      <button (click)="preguntar()" [disabled]="!miPregunta || cargando">
        ➤
      </button>
    </div>

  </main>

</div>
